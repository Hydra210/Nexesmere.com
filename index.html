<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@nexesmere</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <canvas id="stars"></canvas>
  <canvas id="viz"></canvas>
  <div class="grain"></div>

  <div id="entryGate" class="entry-gate">
    <span class="entry-text">CLICK TO ENTER</span>
  </div>

  <main id="mainCard" class="card blurred">

    <div class="avatar-wrap">
      <img id="decoRing" class="deco-ring" src="" alt="" hidden>
      <img id="avatar" class="avatar" src="" alt="avatar">
      <span id="statusDot" class="status-dot" data-status="offline"></span>
    </div>

    <div class="name-wrap">
      <h1 id="displayName" class="display-name">LOADING</h1>
      <div id="nameParticles" class="name-particles"></div>
    </div>
    <p id="username" class="username">@loading</p>
    <p id="statusText" class="status-text">— — —</p>

    <div class="divider"></div>

    <div id="activityFeed" class="activity-feed">
      <div class="activity-row">
        <span class="activity-eyebrow">CONNECTING</span>
        <span class="activity-detail">pulling discord data...</span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="socials">
      <a class="social-btn" href="https://www.instagram.com/pat2769_/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="3" width="18" height="18" rx="5" fill="none" stroke="currentColor" stroke-width="1.8"/>
          <circle cx="12" cy="12" r="4.2" fill="none" stroke="currentColor" stroke-width="1.8"/>
          <circle cx="17.2" cy="6.8" r="1.1" fill="currentColor"/>
        </svg>
      </a>
      <a class="social-btn" href="http://discord.com/users/728856632288608336" target="_blank" rel="noopener noreferrer" aria-label="Discord">
        <svg viewBox="0 0 24 24">
          <path d="M6 8c0-2.8 2.5-5 6-5s6 2.2 6 5v6c0 3-2.7 5.5-6 5.5S6 17 6 14V8z" fill="none" stroke="currentColor" stroke-width="1.8"/>
          <circle cx="9.6" cy="11.5" r="1.3" fill="currentColor"/>
          <circle cx="14.4" cy="11.5" r="1.3" fill="currentColor"/>
        </svg>
      </a>
      <a class="social-btn" href="https://www.roblox.com/users/1230783705/profile" target="_blank" rel="noopener noreferrer" aria-label="Roblox">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="3" width="8" height="8" rx="1.2" transform="rotate(-8 7 7)" fill="currentColor"/>
          <rect x="13" y="4" width="7" height="7" rx="1.2" transform="rotate(10 16.5 7.5)" fill="none" stroke="currentColor" stroke-width="1.6"/>
          <rect x="8" y="13" width="8" height="8" rx="1.2" transform="rotate(-4 12 17)" fill="none" stroke="currentColor" stroke-width="1.6"/>
        </svg>
      </a>
    </div>

  </main>

  <footer class="credit">
    <span id="clock">00:00:00</span>
    <span class="dot-sep">/</span>
    <span>NEXESMERE.SYS</span>
  </footer>

  <audio id="bgAudio" src="music/track.mp3" loop preload="auto"></audio>

  <script src="script.js"></script>
</body>
</html>
