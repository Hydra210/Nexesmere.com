<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@nexesmere</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <video id="bgVideo" class="bg-video" muted playsinline preload="auto" hidden></video>
  <canvas id="stars"></canvas>
  <canvas id="viz"></canvas>
  <div class="grain"></div>

  <div id="myTimeWidget" class="my-time-widget">
    <span class="my-time-label">My Time</span>
    <span id="myTimeValue" class="my-time-value">--:--</span>
  </div>

  <div id="entryGate" class="entry-gate">
    <span class="entry-text">CLICK TO ENTER</span>
  </div>

  <main id="mainCard" class="card blurred">

    <div class="avatar-wrap">
      <img id="decoRing" class="deco-ring" src="" alt="" hidden>
      <img id="avatar" class="avatar" src="" alt="avatar">
      <span id="statusDot" class="status-dot" data-status="offline"></span>
      <img id="dndIcon" class="dnd-icon" src="icons/dnd.png" alt="" hidden onerror="this.hidden=true; this.dataset.broken='1'; console.warn('missing icon: icons/dnd.png');">
    </div>

    <div class="name-wrap">
      <h1 id="displayName" class="display-name">LOADING</h1>
      <div id="nameParticles" class="name-particles"></div>
    </div>
    <p id="username" class="username">@loading</p>
    <p id="statusText" class="status-text">— — —</p>

    <div class="divider"></div>

    <div id="activityFeed" class="activity-feed">
      <div class="activity-row">
        <span class="activity-eyebrow">CONNECTING</span>
        <span class="activity-detail">pulling discord data...</span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="socials">
      <a class="social-btn" href="https://www.instagram.com/pat2769_/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
        <img src="icons/instagram.png" alt="Instagram" class="social-icon" onerror="this.closest('.social-btn').style.display='none'; console.warn('missing icon: icons/instagram.png');">
      </a>
      <a class="social-btn" href="http://discord.com/users/728856632288608336" target="_blank" rel="noopener noreferrer" aria-label="Discord">
        <img src="icons/discord.png" alt="Discord" class="social-icon" onerror="this.closest('.social-btn').style.display='none'; console.warn('missing icon: icons/discord.png');">
      </a>
      <a class="social-btn" href="https://www.roblox.com/users/1230783705/profile" target="_blank" rel="noopener noreferrer" aria-label="Roblox">
        <img src="icons/roblox.png" alt="Roblox" class="social-icon" onerror="this.closest('.social-btn').style.display='none'; console.warn('missing icon: icons/roblox.png');">
      </a>
    </div>

  </main>

  <audio id="bgAudio" preload="auto"></audio>

  <script src="script.js"></script>
</body>
</html>
